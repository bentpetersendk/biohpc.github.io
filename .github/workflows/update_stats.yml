name: Update website statistics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5,17 * * *"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade requests

      - name: Generate stats.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_VIEW: ${{ secrets.AIRTABLE_VIEW }}
          AIRTABLE_APPROVED_USERS_FORMULA: ${{ vars.AIRTABLE_APPROVED_USERS_FORMULA }}
          AIRTABLE_PENDING_USER_REQUESTS_FORMULA: ${{ vars.AIRTABLE_PENDING_USER_REQUESTS_FORMULA }}
          AIRTABLE_APPROVED_PIS_FORMULA: ${{ vars.AIRTABLE_APPROVED_PIS_FORMULA }}
          AIRTABLE_PENDING_PI_REQUESTS_FORMULA: ${{ vars.AIRTABLE_PENDING_PI_REQUESTS_FORMULA }}
          AIRTABLE_ACTIVE_PROJECTS_FORMULA: ${{ vars.AIRTABLE_ACTIVE_PROJECTS_FORMULA }}
          AIRTABLE_ORDERED_PROJECTS_FORMULA: ${{ vars.AIRTABLE_ORDERED_PROJECTS_FORMULA }}
        run: python scripts/update_stats.py

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update website statistics
          file_pattern: stats.json
