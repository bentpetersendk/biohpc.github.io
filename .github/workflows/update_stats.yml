name: Validate statistics generator

on:
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/update_stats.py
      - .github/workflows/update_stats.yml

permissions:
  contents: read

jobs:
  validate-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile statistics generator
        run: python -m py_compile scripts/update_stats.py
