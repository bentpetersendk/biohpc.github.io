name: Update website statistics

on:
  workflow_dispatch:
  schedule:
  - cron: "0 * * * *" 
  
permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ ! -s requirements.txt ]; then
            echo "::error file=requirements.txt::requirements.txt is missing or empty. Add the Python dependencies required by scripts/update_stats.py."
            exit 1
          fi
          python -m pip install -r requirements.txt

      - name: Validate stats script dependencies
        run: |
          python -m py_compile scripts/update_stats.py
          python -c "import runpy; runpy.run_path('scripts/update_stats.py', run_name='biohpc_stats_dependency_check')"

      - name: Generate stats.json
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_VIEW: ${{ secrets.AIRTABLE_VIEW }}
          AIRTABLE_APPROVED_USERS_FORMULA: ${{ vars.AIRTABLE_APPROVED_USERS_FORMULA }}
          AIRTABLE_PENDING_USER_REQUESTS_FORMULA: ${{ vars.AIRTABLE_PENDING_USER_REQUESTS_FORMULA }}
          AIRTABLE_APPROVED_PIS_FORMULA: ${{ vars.AIRTABLE_APPROVED_PIS_FORMULA }}
          AIRTABLE_PENDING_PI_REQUESTS_FORMULA: ${{ vars.AIRTABLE_PENDING_PI_REQUESTS_FORMULA }}
          AIRTABLE_ACTIVE_PROJECTS_FORMULA: ${{ vars.AIRTABLE_ACTIVE_PROJECTS_FORMULA }}
          AIRTABLE_ORDERED_PROJECTS_FORMULA: ${{ vars.AIRTABLE_ORDERED_PROJECTS_FORMULA }}
        run: python scripts/update_stats.py

      - name: Commit updated stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update website statistics
          file_pattern: stats.json
